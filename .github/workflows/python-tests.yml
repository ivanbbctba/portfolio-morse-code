name: Python Tests

on:
  push:
    branches: [ "main", "dev" ]  # or whichever branches you want to test
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - uses: actions/checkout@v3

      # 2. Set up Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 3. Run tests
      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "*_test.py"