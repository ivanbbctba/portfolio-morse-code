name: Python Linting and Tests

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Check out code
        uses: actions/checkout@v3

      # 2. Set up Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 3. Install dependencies (flake8, parameterized, etc.)
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 parameterized

      # 4. Run lint (PEP 8 checks)
      - name: Lint with flake8
        run: |
          # First pass: Fail on critical errors only
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Second pass: Allow warnings, with complexity and line length limits
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

      # 5. Run tests with unittest
      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "*_test.py" -v